<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Sakthi Transport</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #16a34a;
            --accent: #dc2626;
            --bg: #f8fafc;
        }


        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        header { background: red; color: white; padding: 1rem; text-align: center; }
        
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Product Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card img { max-width: 100%; height: 150px; object-fit: contain; }
        .price { color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        .discount { background: #ffedd5; color: #9a3412; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; }
        
        button { 
            background: var(--primary); color: white; border: none; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }
         .home-btn {
            position: fixed;
          bottom: 200px;
            right:650px;
            padding: 10px 22px;
            background: linear-gradient(90deg, #ffcc00, #ff9900);
            color: #000;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            z-index: 1000;
        }
         .home-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
         }
        

        /* Checkout Screen (Hidden by default) */
        #checkout-screen, #success-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }

        input { display: block; width: 80%; max-width: 400px; margin: 10px 0; padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        
        .confirm-btn { background: var(--secondary); font-size: 1.2rem; padding: 15px 40px; }
        
        .success-box { text-align: center; color: var(--secondary); }
        .success-icon { font-size: 5rem; }
    </style>
</head>
<body>

<header>
    <h1>Sri Sakthi Transport</h1>
    <p>All India Tours</p>
</header>

<div class="container" id="main-store">
    <div class="grid">
        <div class="card">
            <img src="thalaiva.jpg" alt="bus">
            <h3>Thalaiva</h3>
            <span class="discount">Per day rent 25000</span>
            <p class="price"></p>
            <button onclick="openCheckout('Thalaiva')">Book now</button>
        </div>
        <div class="card">
            <img src="komban.avif" alt="bus">
            <h3>Komban</h3>
            <span class="discount">per day rent 30000</span>
            <p class="price"></p>
            <button onclick="openCheckout('Komban')">Book now</button>
        </div>
        <div class="card">
            <img src="image.png" alt="Headset">
            <h3>Andavar</h3>
            <span class="discount">per day rent 25000</span>
            <p class="price"></p>
            <button onclick="openCheckout('Andavar')">Book now</button>
        </div>
        <div class="card">
            <img src="images1.jpg" alt="Cam">
            <h3>Kumaran</h3>
            <span class="discount">per day rent 25000</span>
            <p class="price"></p>
            <button onclick="openCheckout('Kumaran')">Book now</button>
        </div>
    </div>
</div>
<body>
<a href="Book Now.html" class="home-btn">Book Bus</a>
</body>
        
</body>
</html>
