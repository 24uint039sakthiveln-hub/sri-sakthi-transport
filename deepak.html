<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fresh Fish Market</title>
<link rel="stylesheet" href="style.css">
<style>
    /* Product Cards */
    .products { display: flex; flex-wrap: wrap; gap: 20px; }
    .product-card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; text-align: center; width: 200px; }
    .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }

    /* Modal Styles */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; 
             overflow: auto; background-color: rgba(0,0,0,0.5); }
    .modal-content { background-color: #f2f2f2; margin: 10% auto; padding: 20px; border-radius: 8px; 
                     max-width: 400px; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.2);}
    .modal-content h2 { text-align: center; }
    .modal-content input, .modal-content select, .modal-content button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: 1px solid #ccc; }
    .close { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; }
    .success-message { color:RED    ; text-align: center; display: none; margin-top: 10px; }
</style>
</head>
<body>

<!-- Navbar -->
<header class="navbar">
    <div class="logo">🐟 FreshFish</div>
    <input type="text" placeholder="Search for fish, seafood..." class="search-box">
    <button class="login-btn">Login</button>
</header>

<!-- Banner -->
<section class="banner">
    <h1>Sumruth fish shop</h1>
    <p>Up to 30% OFF Today</p>
</section>

<!-- Products -->
<section class="products">
    <div class="product-card">
        <img src="rohu.webp" alt="Rohu Fish">
        <h3>Rohu Fish</h3>
        <p class="price">₹299 <span>₹399</span></p>
        <button class="add-to-cart-btn" data-fish="Rohu Fish">Add to Cart</button>
    </div>

    <div class="product-card">
        <img src="jilabi.jpg" alt="Jilabi Fish">
        <h3>Jilabi Fish</h3>
        <p class="price">₹349 <span>₹449</span></p>
        <button class="add-to-cart-btn" data-fish="Jilabi Fish">Add to Cart</button>
    </div>

    <div class="product-card">
        <img src="parai.png" alt="Parai Fish">
        <h3>Parai Fish</h3>
        <p class="price">₹499 <span>₹650</span></p>
        <button class="add-to-cart-btn" data-fish="Parai Fish">Add to Cart</button>
    </div>

    <div class="product-card">
        <img src="katla.jpg" alt="Katla Fish">
        <h3>Katla Fish</h3>
        <p class="price">₹699 <span>₹899</span></p>
        <button class="add-to-cart-btn" data-fish="Katla Fish">Add to Cart</button>
    </div>
</section>

<!-- Modal Booking Form -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Book Your Fish Order</h2>
        <form id="bookingForm">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <textarea name="address" placeholder="Your Address" rows="3" required></textarea> <!-- Address field -->
    <select name="fish" id="fishSelect" required>
        <option value="">Select Fish</option>
        <option value="Rohu Fish">Rohu Fish</option>
        <option value="Jilabi Fish">Jilabi Fish</option>
        <option value="Parai Fish">Parai Fish</option>
        <option value="Katla Fish">Katla Fish</option>
    </select>
    <input type="number" name="quantity" placeholder="Quantity" min="1" required>
    <button type="submit">Book Now</button>
</form>


            
        </form>
        <p class="success-message" id="successMessage">Your booking was successful! 🐟</p>
    </div>
</div>

<!-- Footer -->
<footer>
    <p>© 2026 FreshFish Market | Like Flipkart Style Demo</p>
</footer>

<script>
    // Modal handling
    const modal = document.getElementById('bookingModal');
    const closeBtn = document.querySelector('.close');
    const fishSelect = document.getElementById('fishSelect');
    const bookingForm = document.getElementById('bookingForm');
    const successMessage = document.getElementById('successMessage');

    // Open modal with fish pre-selected
    document.querySelectorAll('.add-to-cart-btn').forEach(button => {
        button.addEventListener('click', () => {
            const fishName = button.getAttribute('data-fish');
            fishSelect.value = fishName;
            successMessage.style.display = 'none';
            modal.style.display = 'block';
        });
    });

    // Close modal
    closeBtn.addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', (e) => { if (e.target == modal) modal.style.display = 'none'; });

    // Handle form submission
    bookingForm.addEventListener('submit', function(e) {
        e.preventDefault();
        successMessage.style.display = 'block';
        bookingForm.reset();
    });
</script>

</body>
</html>
